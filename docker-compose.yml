services:
  # Frontend service - Next.js portfolio application
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: development
    container_name: portfolio-frontend
    ports:
      - "${PORT:-8087}:${PORT:-8087}"
    volumes:
      # Mount source code for hot reloading in development
      - ./frontend:/app
      # Mount knowledge directory for AI chatbot context
      - ./knowledge:/app/knowledge:ro
      # Prevent node_modules from being overwritten by volume mount
      - /app/node_modules
      # Prevent .next from being overwritten
      - /app/.next
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=${PORT:-8087}
      - HOSTNAME=${HOSTNAME:-0.0.0.0}
      # Logging level (debug, info, warn, error)
      - LOG_LEVEL=${LOG_LEVEL:-info}
      # AI Chatbot - OpenAI Configuration
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      # Engpass-Check funnel: database, base URL, SMTP, CleverReach
      # Inside Docker the app always reaches the `postgres` service directly,
      # independent of the host .env DATABASE_URL (which targets localhost).
      - DATABASE_URL=postgres://${POSTGRES_USER:-dbuser}:${POSTGRES_PASSWORD:-dbpass}@postgres:5432/${POSTGRES_DB:-danielkreuzhofer}
      - BASE_URL=${BASE_URL:-http://localhost:8087}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - CRON_SECRET=${CRON_SECRET:-}
      - CLEVERREACH_CLIENT_ID=${CLEVERREACH_CLIENT_ID:-}
      - CLEVERREACH_CLIENT_SECRET=${CLEVERREACH_CLIENT_SECRET:-}
      - CLEVERREACH_GROUP_ID=${CLEVERREACH_GROUP_ID:-}
      - CLEVERREACH_FORM_ID=${CLEVERREACH_FORM_ID:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - development

  # Production frontend service (use with: docker compose --profile production up)
  frontend-prod:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: production
      args:
        # Optional: Provide these to fetch private knowledge repo at build time
        # KNOWLEDGE_REPO format: github.com/username/repo.git (no https://)
        - KNOWLEDGE_REPO=${KNOWLEDGE_REPO:-}
        - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    container_name: portfolio-frontend-prod
    ports:
      - "${PORT:-8087}:${PORT:-8087}"
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-8087}
      - HOSTNAME=${HOSTNAME:-0.0.0.0}
      # Logging level (debug, info, warn, error) - defaults to warn in production
      - LOG_LEVEL=${LOG_LEVEL:-info}
      # AI Chatbot - OpenAI Configuration
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      # Engpass-Check funnel: database, base URL, SMTP, CleverReach
      # Inside Docker the app always reaches the `postgres` service directly,
      # independent of the host .env DATABASE_URL (which targets localhost).
      - DATABASE_URL=postgres://${POSTGRES_USER:-dbuser}:${POSTGRES_PASSWORD:-dbpass}@postgres:5432/${POSTGRES_DB:-danielkreuzhofer}
      - BASE_URL=${BASE_URL:-http://localhost:8087}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - CRON_SECRET=${CRON_SECRET:-}
      - CLEVERREACH_CLIENT_ID=${CLEVERREACH_CLIENT_ID:-}
      - CLEVERREACH_CLIENT_SECRET=${CLEVERREACH_CLIENT_SECRET:-}
      - CLEVERREACH_GROUP_ID=${CLEVERREACH_GROUP_ID:-}
      - CLEVERREACH_FORM_ID=${CLEVERREACH_FORM_ID:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - production

  # Postgres - Engpass-Check submissions store (dev + prod)
  postgres:
    image: postgres:16-alpine
    container_name: portfolio-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-dbuser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-dbpass}
      - POSTGRES_DB=${POSTGRES_DB:-danielkreuzhofer}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dbuser} -d ${POSTGRES_DB:-danielkreuzhofer}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    profiles:
      - development
      - production

volumes:
  postgres-data:
